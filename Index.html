<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #fffcfa;
    --surface2: #fdf7f2;
    --border: #ecddd3;
    --shadow: rgba(180,140,110,0.12);
    --text: #3d2e24;
    --text2: #9a7f70;
    --text3: #c4a898;
    --peach: #f5b8a0;
    --peach-light: #fde8df;
    --peach-dark: #e8906e;
    --mint: #a8d8c8;
    --mint-light: #dff2ec;
    --lavender: #c5b8e8;
    --lavender-light: #ede8f8;
    --butter: #f5dfa0;
    --butter-light: #fdf4db;
    --sky: #a8cce8;
    --sky-light: #ddeef8;
    --blush: #f0b8c8;
    --blush-light: #fce8ef;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(245,184,160,0.2) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(197,184,232,0.2) 0%, transparent 50%),
      radial-gradient(circle at 60% 10%, rgba(168,216,200,0.15) 0%, transparent 40%);
  }
  .app { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }/* HEADER */
header { text-align: center; margin-bottom: 24px; }
.logo-badge { display: inline-flex; align-items: center; gap: 8px; background: var(–surface); border: 1.5px solid var(–border); border-radius: 20px; padding: 6px 16px; font-size: 11px; font-weight: 700; color: var(–text2); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; box-shadow: 0 2px 8px var(–shadow); }
header h1 { font-family: ‘Playfair Display’, serif; font-size: 30px; color: var(–text); margin-bottom: 0; }
/* NOTIF BANNER */
.notif-banner { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(–lavender-light); border: 1.5px solid var(–lavender); border-radius: 14px; padding: 10px 14px; margin-bottom: 16px; font-size: 12px; font-weight: 700; color: #3a2570; }
.notif-banner button { padding: 6px 14px; background: var(–lavender); border: none; border-radius: 10px; color: #3a2570; font-family: ‘Nunito’, sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; white-space: nowrap; }
/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(–surface); border: 1.5px solid var(–border); border-radius: 18px; padding: 14px 12px; text-align: center; box-shadow: 0 3px 12px var(–shadow); transition: transform 0.2s; cursor: default; }
.stat-card:hover { transform: translateY(-2px); }
.stat-card .emoji { font-size: 20px; margin-bottom: 3px; }
.stat-card .num { font-family: ‘Playfair Display’, serif; font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
.stat-card .lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(–text2); }
.stat-card.s-overdue { background: linear-gradient(135deg, #fff0ec, #ffe8e0); border-color: #f5c4b4; }
.stat-card.s-overdue .num { color: #e05a35; }
.stat-card.s-today { background: linear-gradient(135deg, #fffaec, #fff3d0); border-color: #f5dfa0; }
.stat-card.s-today .num { color: #c4860a; }
.stat-card.s-active { background: linear-gradient(135deg, #f0faf6, #dff2ec); border-color: #a8d8c8; }
.stat-card.s-active .num { color: #2a8a6a; }
/* CITY FILTER */
.city-filter-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.city-btn { padding: 7px 14px; border: 1.5px solid var(–border); border-radius: 20px; background: var(–surface); color: var(–text2); font-family: ‘Nunito’, sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap; box-shadow: 0 2px 6px var(–shadow); }
.city-btn.active { color: white; border-color: transparent; }
.city-btn[data-city=“all”].active { background: var(–peach-dark); }
.city-btn[data-city=“Charleston”].active { background: #74b9ff; }
.city-btn[data-city=“Orangeburg”].active { background: #a8d8c8; }
.city-btn[data-city=“Sumter”].active { background: #c5b8e8; }
.city-btn[data-city=“Charlotte”].active { background: #f5b8a0; }
/* CONTROLS */
.controls { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
/* PROPERTY DROPDOWN */
.prop-dropdown-wrap { position: relative; flex: 1; min-width: 180px; }
.prop-dropdown-btn { width: 100%; padding: 9px 16px; border: 1.5px solid var(–border); border-radius: 20px; background: var(–surface); color: var(–text2); font-family: ‘Nunito’, sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 8px; box-shadow: 0 2px 6px var(–shadow); transition: all 0.2s; }
.prop-dropdown-btn.has-selection { color: #6b2a0a; background: var(–peach-light); border-color: var(–peach); }
.prop-dropdown-btn .arrow { font-size: 10px; transition: transform 0.2s; }
.prop-dropdown-btn.open .arrow { transform: rotate(180deg); }
.prop-dropdown-menu { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: #fffcfa; border: 1.5px solid var(–border); border-radius: 16px; box-shadow: 0 8px 32px rgba(180,140,110,0.22); z-index: 200; overflow: hidden; max-height: 320px; overflow-y: auto; }
.prop-dropdown-menu .city-group-label { padding: 8px 14px 4px; font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(–text3); background: #f5f0eb; }
.prop-dropdown-menu .prop-option { padding: 9px 16px; font-size: 13px; font-weight: 700; color: var(–text); cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 8px; background: #fffcfa; }
.prop-dropdown-menu .prop-option:hover { background: var(–peach-light); }
.prop-dropdown-menu .prop-option.selected { background: var(–peach-light); color: var(–peach-dark); }
.prop-dropdown-menu .prop-option .city-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.prop-dropdown-menu .all-option { padding: 9px 16px; font-size: 13px; font-weight: 800; color: var(–text2); cursor: pointer; border-bottom: 1px solid var(–border); transition: background 0.15s; background: #fffcfa; }
.prop-dropdown-menu .all-option:hover { background: var(–peach-light); }
.prop-dropdown-menu .all-option.selected { color: var(–peach-dark); }
.btn-add { padding: 9px 18px; background: linear-gradient(135deg, var(–peach), var(–peach-dark)); color: white; border: none; border-radius: 20px; font-family: ‘Nunito’, sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 14px rgba(232,144,110,0.4); transition: all 0.2s; white-space: nowrap; }
.btn-add:hover { transform: translateY(-2px); }
.btn-secondary { padding: 9px 16px; background: var(–surface); border: 1.5px solid var(–border); border-radius: 20px; color: var(–text2); font-family: ‘Nunito’, sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap; box-shadow: 0 2px 6px var(–shadow); }
.btn-secondary:hover { border-color: var(–peach); color: var(–peach-dark); }
/* TABS */
.tabs { display: flex; gap: 4px; background: var(–surface); border: 1.5px solid var(–border); border-radius: 16px; padding: 5px; margin-bottom: 16px; box-shadow: 0 2px 8px var(–shadow); }
.tab { flex: 1; padding: 8px 6px; border: none; background: transparent; color: var(–text2); font-family: ‘Nunito’, sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; border-radius: 12px; transition: all 0.2s; text-align: center; }
.tab.active { background: var(–lavender); color: #3a2570; }
.tab:not(.active):hover { background: var(–lavender-light); }
/* NOTIFY BAR */
.notify-bar { background: var(–mint-light); border: 1.5px solid var(–mint); border-radius: 14px; padding: 10px 16px; margin-bottom: 16px; font-size: 13px; font-weight: 600; color: #1a6a50; display: none; }
.notify-bar.show { display: block; }
/* LEAD CARDS */
.leads-grid { display: flex; flex-direction: column; gap: 12px; }
.lead-card { background: var(–surface); border: 1.5px solid var(–border); border-radius: 20px; padding: 16px 18px; box-shadow: 0 4px 16px var(–shadow); transition: all 0.25s; animation: slideIn 0.3s ease; position: relative; overflow: hidden; }
.lead-card::before { content: ‘’; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; border-radius: 20px 0 0 20px; }
.lead-card.overdue::before { background: linear-gradient(180deg, #ff6b35, #ff9a7a); }
.lead-card.due-today::before { background: linear-gradient(180deg, #f5a623, #f5d060); }
.lead-card.ok::before { background: linear-gradient(180deg, #a8d8c8, #74c4aa); }
.lead-card.disabled::before { background: var(–border); }
.lead-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(–shadow); }
@keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.card-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
.fire-badge { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 52px; }
.fire-emoji { font-size: 28px; line-height: 1; margin-bottom: 2px; }
.fire-score { font-family: ‘Playfair Display’, serif; font-size: 14px; font-weight: 700; }
.fire-score.hot { color: #e05a20; }
.fire-score.warm { color: #c4860a; }
.fire-score.cold { color: #5598d0; }
.fire-score.dis { color: var(–text3); }
.lead-main { flex: 1; min-width: 0; }
.lead-name { font-size: 15px; font-weight: 800; color: var(–text); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.prop-pill { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; background: var(–lavender-light); color: #5a3a9a; border: 1px solid var(–lavender); }
.city-pill { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; border: 1px solid transparent; }
.city-pill.Charleston { background: rgba(116,185,255,0.15); color: #2a6aaa; border-color: rgba(116,185,255,0.3); }
.city-pill.Orangeburg { background: rgba(168,216,200,0.2); color: #1a6a50; border-color: rgba(168,216,200,0.4); }
.city-pill.Sumter { background: var(–lavender-light); color: #5a3a9a; border-color: var(–lavender); }
.city-pill.Charlotte { background: var(–peach-light); color: #8a3a10; border-color: var(–peach); }
.disabled-pill { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; background: #f0ebe6; color: var(–text3); border: 1px solid var(–border); }
.lead-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(–text2); font-weight: 600; }
.heat-bar-wrap { margin: 10px 0 8px; display: flex; align-items: center; gap: 10px; }
.heat-bar-track { flex: 1; height: 8px; background: var(–bg); border-radius: 10px; overflow: hidden; border: 1px solid var(–border); }
.heat-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }
.heat-bar-fill.hot { background: linear-gradient(90deg, #f5b8a0, #ff6b35); }
.heat-bar-fill.warm { background: linear-gradient(90deg, #f5dfa0, #f5a623); }
.heat-bar-fill.cold { background: linear-gradient(90deg, #a8cce8, #74b9ff); }
.heat-bar-fill.dis { background: var(–border); }
.heat-label { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; min-width: 34px; }
.heat-label.hot { color: #e05a20; }
.heat-label.warm { color: #c4860a; }
.heat-label.cold { color: #5598d0; }
.heat-label.dis { color: var(–text3); }
.followup-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.status-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; }
.chip-overdue { background: #ffe8e0; color: #c03a18; border: 1px solid #f5c4b4; }
.chip-today { background: #fff3d0; color: #a06800; border: 1px solid #f5dfa0; }
.chip-ok { background: var(–mint-light); color: #1a6a50; border: 1px solid var(–mint); }
.chip-disabled { background: #f0ebe6; color: var(–text3); border: 1px solid var(–border); }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-done { padding: 7px 14px; background: linear-gradient(135deg, var(–mint-light), var(–mint)); border: 1.5px solid var(–mint); border-radius: 12px; color: #1a5a44; font-family: ‘Nunito’, sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
.btn-done:hover { transform: translateY(-1px); }
.btn-edit { padding: 7px 14px; background: var(–lavender-light); border: 1.5px solid var(–lavender); border-radius: 12px; color: #3a2570; font-family: ‘Nunito’, sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
.btn-edit:hover { background: var(–lavender); }
.btn-reactivate { padding: 7px 14px; background: var(–butter-light); border: 1.5px solid var(–butter); border-radius: 12px; color: #7a5a0a; font-family: ‘Nunito’, sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
.btn-delete { padding: 7px 14px; background: #f5f0eb; border: 1.5px solid var(–border); border-radius: 12px; color: var(–text2); font-family: ‘Nunito’, sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
.btn-delete:hover { background: var(–peach-light); border-color: var(–peach); color: var(–peach-dark); }
.empty { text-align: center; padding: 50px 20px; color: var(–text2); background: var(–surface); border-radius: 20px; border: 1.5px dashed var(–border); }
.empty .icon { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 14px; font-weight: 600; }
/* MODALS */
.modal-overlay { position: fixed; inset: 0; background: rgba(61,46,36,0.35); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal { background: var(–surface); border: 1.5px solid var(–border); border-radius: 24px; padding: 28px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(180,140,110,0.25); animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1); max-height: 90vh; overflow-y: auto; }
@keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal h2 { font-family: ‘Playfair Display’, serif; font-size: 22px; margin-bottom: 20px; color: var(–text); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; font-weight: 800; color: var(–text2); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; background: var(–bg); border: 1.5px solid var(–border); border-radius: 12px; padding: 10px 14px; color: var(–text); font-family: ‘Nunito’, sans-serif; font-size: 14px; font-weight: 600; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(–peach); box-shadow: 0 0 0 3px var(–peach-light); }
/* FIRE SLIDER */
.fire-slider-wrap { background: var(–bg); border: 1.5px solid var(–border); border-radius: 14px; padding: 14px 16px; }
.fire-display { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
.fire-display .big-fire { font-size: 36px; }
.fire-display .score-info .score-big { font-family: ‘Playfair Display’, serif; font-size: 36px; font-weight: 700; line-height: 1; transition: color 0.2s; }
.fire-display .score-info .score-label { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s; }
input[type=range].fire-range { width: 100%; -webkit-appearance: none; height: 6px; border-radius: 3px; outline: none; border: none; padding: 0; cursor: pointer; margin-bottom: 6px; }
input[type=range].fire-range::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: white; border: 3px solid var(–peach-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: pointer; }
.fire-ticks { display: flex; justify-content: space-between; padding: 0 4px; }
.fire-ticks span { font-size: 10px; color: var(–text3); font-weight: 700; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
.btn-modal-cancel { padding: 10px 20px; background: transparent; border: 1.5px solid var(–border); border-radius: 12px; color: var(–text2); font-family: ‘Nunito’, sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-modal-save { padding: 10px 24px; background: linear-gradient(135deg, var(–peach), var(–peach-dark)); border: none; border-radius: 12px; color: white; font-family: ‘Nunito’, sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 14px rgba(232,144,110,0.4); }
/* OPTIONS MODAL */
.btn-movingin { width: 100%; padding: 14px 20px; background: linear-gradient(135deg, var(–mint-light), var(–mint)); border: 1.5px solid var(–mint); border-radius: 14px; color: #1a5a44; font-family: ‘Nunito’, sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; transition: all 0.2s; text-align: left; }
.btn-movingin:hover { transform: translateY(-1px); }
.btn-removelead { width: 100%; padding: 14px 20px; background: #fff0ec; border: 1.5px solid #f5c4b4; border-radius: 14px; color: #c03a18; font-family: ‘Nunito’, sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; transition: all 0.2s; text-align: left; }
.btn-removelead:hover { background: #ffe0d6; }
/* PROPERTY MANAGER */
.prop-input-row { display: flex; gap: 8px; }
.prop-input-row input { flex: 1; }
.btn-add-prop { padding: 10px 16px; background: var(–peach-light); border: 1.5px solid var(–peach); border-radius: 12px; color: var(–peach-dark); font-family: ‘Nunito’, sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
.btn-add-prop:hover { background: var(–peach); color: white; }
.prop-city-groups { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
.prop-city-section-label { font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(–text3); margin-bottom: 6px; }
.prop-items-row { display: flex; flex-wrap: wrap; gap: 7px; }
.prop-item-mgr { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; }
.prop-item-mgr.Charleston { background: rgba(116,185,255,0.12); border: 1.5px solid rgba(116,185,255,0.3); color: #2a6aaa; }
.prop-item-mgr.Orangeburg { background: var(–mint-light); border: 1.5px solid var(–mint); color: #1a6a50; }
.prop-item-mgr.Sumter { background: var(–lavender-light); border: 1.5px solid var(–lavender); color: #3a2570; }
.prop-item-mgr.Charlotte { background: var(–peach-light); border: 1.5px solid var(–peach); color: #8a3a10; }
.prop-item-mgr button { background: none; border: none; color: var(–text3); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; font-weight: 700; }
.prop-item-mgr button:hover { color: #c03a18; }
.city-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.dot-Charleston { background: #74b9ff; }
.dot-Orangeburg { background: #a8d8c8; }
.dot-Sumter { background: #c5b8e8; }
.dot-Charlotte { background: #f5b8a0; }
@media (max-width: 560px) {
.stats-row { gap: 8px; }
.stat-card { padding: 10px 8px; }
.stat-card .num { font-size: 22px; }
.form-row { grid-template-columns: 1fr; }
header h1 { font-size: 26px; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-badge">🏠 Property Management</div>
    <h1>Lead Tracker</h1>
  </header><div id="notif-banner" class="notif-banner" style="display:none">
    <span>🔔 Enable notifications to get follow-up alerts</span>
    <button onclick="requestNotifPermission()">Enable</button>
  </div><div class="stats-row">
    <div class="stat-card s-overdue"><div class="emoji">🔥</div><div class="num" id="stat-overdue">0</div><div class="lbl">Overdue</div></div>
    <div class="stat-card s-today"><div class="emoji">⏰</div><div class="num" id="stat-today">0</div><div class="lbl">Due Today</div></div>
    <div class="stat-card s-active"><div class="emoji">✨</div><div class="num" id="stat-active">0</div><div class="lbl">Active</div></div>
  </div><!-- CITY FILTER --><div class="city-filter-row" id="city-filter-row">
    <button class="city-btn active" data-city="all" onclick="setCity('all')">🗺 All Cities</button>
    <button class="city-btn" data-city="Charleston" onclick="setCity('Charleston')">Charleston</button>
    <button class="city-btn" data-city="Orangeburg" onclick="setCity('Orangeburg')">Orangeburg</button>
    <button class="city-btn" data-city="Sumter" onclick="setCity('Sumter')">Sumter</button>
    <button class="city-btn" data-city="Charlotte" onclick="setCity('Charlotte')">Charlotte</button>
  </div><div id="notify-bar" class="notify-bar"></div><div class="controls">
    <!-- PROPERTY DROPDOWN -->
    <div class="prop-dropdown-wrap" id="prop-dropdown-wrap">
      <button class="prop-dropdown-btn" id="prop-dropdown-btn" onclick="togglePropDropdown()">
        <span id="prop-dropdown-label">All Properties</span>
        <span class="arrow">▼</span>
      </button>
      <div class="prop-dropdown-menu" id="prop-dropdown-menu" style="display:none"></div>
    </div>
    <button class="btn-add" onclick="openModal()">＋ Add Lead</button>
    <button class="btn-secondary" onclick="openPropModal()">🏠 Properties</button>
  </div><div class="tabs">
    <button class="tab active" onclick="setTab('active',this)">Active</button>
    <button class="tab" onclick="setTab('due',this)">Due Today</button>
    <button class="tab" onclick="setTab('disabled',this)">Disabled</button>
    <button class="tab" onclick="setTab('all',this)">All</button>
  </div><div class="leads-grid" id="leads-grid"></div>
</div><!-- ADD/EDIT MODAL --><div id="modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">Add Lead</h2>
    <div class="form-row">
      <div class="form-group"><label>Full Name</label><input id="f-name" type="text" placeholder="Jane Smith"></div>
      <div class="form-group"><label>Phone</label><input id="f-phone" type="tel" placeholder="(843) 555-0100"></div>
    </div>
    <div class="form-group"><label>Property</label><select id="f-property"></select></div>
    <div class="form-group">
      <label>Heat Score</label>
      <div class="fire-slider-wrap">
        <div class="fire-display">
          <span class="big-fire" id="big-fire">🔥</span>
          <div class="score-info">
            <div class="score-big" id="score-big">5</div>
            <div class="score-label" id="score-label">Warm</div>
          </div>
        </div>
        <input type="range" class="fire-range" id="f-score" min="1" max="10" value="5" oninput="updateScore(this.value)">
        <div class="fire-ticks"><span>1🧊</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10🔥</span></div>
      </div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="f-notes" rows="2" placeholder="Quick notes..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-modal-save" onclick="saveLead()">Save Lead</button>
    </div>
  </div>
</div><!-- OPTIONS MODAL --><div id="options-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeOptionsModal()">
  <div class="modal" style="max-width:360px;text-align:center;">
    <div style="font-size:32px;margin-bottom:8px;">👤</div>
    <h2 id="options-lead-name" style="margin-bottom:6px;font-size:20px;"></h2>
    <p style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:24px;">What would you like to do?</p>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn-movingin" onclick="movingIn(document.getElementById('options-modal').dataset.leadId)">
        🏠 Moving In!
        <span style="display:block;font-size:11px;font-weight:600;opacity:0.8;margin-top:2px;">Marks moved in & deactivates other leads for this property</span>
      </button>
      <button class="btn-removelead" onclick="deleteLead(document.getElementById('options-modal').dataset.leadId);closeOptionsModal()">
        🗑️ Remove Lead
        <span style="display:block;font-size:11px;font-weight:600;opacity:0.8;margin-top:2px;">Permanently deletes this lead</span>
      </button>
      <button class="btn-modal-cancel" style="margin-top:4px;width:100%;text-align:center;" onclick="closeOptionsModal()">Cancel</button>
    </div>
  </div>
</div><!-- PROPERTY MANAGER MODAL --><div id="prop-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closePropModal()">
  <div class="modal">
    <h2>🏠 Manage Properties</h2>
    <div class="form-group">
      <label>Property Name</label>
      <input id="new-prop-input" type="text" placeholder="e.g. 321 Fairington Dr">
    </div>
    <div class="form-group">
      <label>City</label>
      <select id="new-prop-city">
        <option value="Charleston">Charleston</option>
        <option value="Orangeburg">Orangeburg</option>
        <option value="Sumter">Sumter</option>
        <option value="Charlotte">Charlotte</option>
      </select>
    </div>
    <button class="btn-add-prop" style="width:100%;text-align:center;padding:12px;" onclick="addProperty()">＋ Add Property</button>
    <div class="prop-city-groups" id="prop-city-groups"></div>
    <div class="modal-actions">
      <button class="btn-modal-save" onclick="closePropModal()">Done</button>
    </div>
  </div>
</div><script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'pm_leads_v4';
const PROPS_KEY   = 'pm_props_v4';
const CITIES      = ['Charleston', 'Orangeburg', 'Sumter', 'Charlotte'];
const CITY_DOTS   = { Charleston: '#74b9ff', Orangeburg: '#a8d8c8', Sumter: '#c5b8e8', Charlotte: '#f5b8a0' };

// ── STATE ─────────────────────────────────────────────────────────────────────
let leads      = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
// props stored as [{name, city}]
let properties = JSON.parse(localStorage.getItem(PROPS_KEY) || JSON.stringify([
  {name:'Sumter Home', city:'Sumter'},
  {name:'321 Fairington Dr', city:'Charleston'}
]));
// migrate old string-format props
properties = properties.map(p => typeof p === 'string' ? {name: p, city: 'Charleston'} : p);

let editingId    = null;
let currentTab   = 'active';
let currentProp  = 'all';   // 'all' or property name
let currentCity  = 'all';   // 'all' or city name
let propDropOpen = false;

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
  localStorage.setItem(PROPS_KEY, JSON.stringify(properties));
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
function initNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('notif-banner').style.display = 'flex';
  }
  if (Notification.permission === 'granted') {
    scheduleNotifications();
  }
}

function requestNotifPermission() {
  Notification.requestPermission().then(p => {
    document.getElementById('notif-banner').style.display = 'none';
    if (p === 'granted') { scheduleNotifications(); showNotify('🔔 Notifications enabled!'); }
  });
}

function scheduleNotifications() {
  if (Notification.permission !== 'granted') return;
  const now = Date.now();
  leads.forEach(l => {
    if (l.disabled) return;
    const last  = l.lastFollowup || l.created;
    const hours = l.score >= 6 ? 24 : 48;
    const due   = last + hours * 3600000;
    const delay = due - now;
    if (delay > 0 && delay < 24 * 3600000) {
      setTimeout(() => {
        if (Notification.permission === 'granted') {
          new Notification('Follow-up due! 🔥', {
            body: `Time to follow up with ${l.name} — ${l.property}`,
            icon: '🏠'
          });
        }
      }, delay);
    }
  });
}

function fireImmediateNotificationsForDue() {
  if (Notification.permission !== 'granted') return;
  leads.forEach(l => {
    if (l.disabled) return;
    const st = getFollowupStatus(l);
    if (st.overdue) {
      new Notification('Overdue follow-up ⚠️', {
        body: `${l.name} at ${l.property} is overdue for a follow-up!`
      });
    }
  });
}

// ── LOGIC ─────────────────────────────────────────────────────────────────────
function getFollowupHours(score) { return score >= 6 ? 24 : 48; }

function getFireInfo(score) {
  if (score >= 8) return { emoji: '🔥', cls: 'hot',  label: 'Hot!',  trackCls: 'hot'  };
  if (score >= 6) return { emoji: '🌶️', cls: 'hot',  label: 'Warm',  trackCls: 'warm' };
  if (score >= 4) return { emoji: '🌤️', cls: 'warm', label: 'Cool',  trackCls: 'warm' };
  return             { emoji: '🧊', cls: 'cold', label: 'Cold',  trackCls: 'cold' };
}

function getFollowupStatus(lead) {
  if (lead.disabled) return { label: lead.disabledReason || 'Disabled', chipCls: 'chip-disabled', cardCls: 'disabled', overdue: false, dueToday: false };
  const now   = Date.now(), last = lead.lastFollowup || lead.created;
  const due   = last + getFollowupHours(lead.score) * 3600000;
  const diff  = due - now, diffH = diff / 3600000;
  if (diff < 0)    return { label: `${Math.abs(Math.round(diffH))}h overdue`, chipCls: 'chip-overdue', cardCls: 'overdue',   overdue: true,  dueToday: false };
  if (diffH <= 6)  return { label: `Due in ${Math.round(diffH)}h`,            chipCls: 'chip-today',   cardCls: 'due-today', overdue: false, dueToday: true  };
  const days = Math.floor(diffH / 24), hrs = Math.round(diffH % 24);
  return { label: days > 0 ? `In ${days}d ${hrs}h` : `In ${Math.round(diffH)}h`, chipCls: 'chip-ok', cardCls: 'ok', overdue: false, dueToday: false };
}

function getPropCity(propName) {
  const p = properties.find(x => x.name === propName);
  return p ? p.city : '';
}

function checkAutoDisable() {
  const now = Date.now(); let changed = false;
  leads.forEach(l => {
    if (l.disabled || l.score > 5) return;
    if (now - (l.lowScoreSince || l.created) > 7 * 24 * 3600000) {
      l.disabled = true; l.disabledReason = 'Score ≤5 for 7 days'; changed = true;
    }
  });
  if (changed) { save(); showNotify('⚠️ One or more leads auto-disabled after 7 days below score 5.'); }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  checkAutoDisable();
  updateStats();
  renderPropDropdown();
  renderLeads();
}

function updateStats() {
  let overdue = 0, today = 0, active = 0;
  leads.forEach(l => {
    if (l.disabled) return; active++;
    const s = getFollowupStatus(l);
    if (s.overdue) overdue++; if (s.dueToday) today++;
  });
  document.getElementById('stat-overdue').textContent = overdue;
  document.getElementById('stat-today').textContent   = today;
  document.getElementById('stat-active').textContent  = active;
}

// ── PROPERTY DROPDOWN ─────────────────────────────────────────────────────────
function togglePropDropdown() {
  propDropOpen = !propDropOpen;
  const menu = document.getElementById('prop-dropdown-menu');
  const btn  = document.getElementById('prop-dropdown-btn');
  menu.style.display = propDropOpen ? 'block' : 'none';
  btn.classList.toggle('open', propDropOpen);
}

function closePropDropdown() {
  propDropOpen = false;
  document.getElementById('prop-dropdown-menu').style.display = 'none';
  document.getElementById('prop-dropdown-btn').classList.remove('open');
}

document.addEventListener('click', function(e) {
  if (!document.getElementById('prop-dropdown-wrap').contains(e.target)) closePropDropdown();
});

function renderPropDropdown() {
  const menu = document.getElementById('prop-dropdown-menu');
  const label = document.getElementById('prop-dropdown-label');
  const btn   = document.getElementById('prop-dropdown-btn');

  // Filter props by current city
  let visibleProps = currentCity === 'all'
    ? properties
    : properties.filter(p => p.city === currentCity);

  // Group by city
  const groups = {};
  visibleProps.forEach(p => {
    if (!groups[p.city]) groups[p.city] = [];
    groups[p.city].push(p);
  });

  let html = `<div class="all-option ${currentProp==='all'?'selected':''}" onclick="selectProp('all')">All Properties</div>`;
  CITIES.forEach(city => {
    if (!groups[city] || !groups[city].length) return;
    html += `<div class="city-group-label">${city}</div>`;
    groups[city].forEach(p => {
      html += `<div class="prop-option ${currentProp===p.name?'selected':''}" onclick="selectProp('${p.name.replace(/'/g,"\\'")}')">
        <span class="city-dot" style="background:${CITY\_DOTS\[p.city\]||'#ccc'}"></span>${p.name}
      </div>`;
    });
  });

  menu.innerHTML = html;
  label.textContent = currentProp === 'all' ? 'All Properties' : currentProp;
  btn.classList.toggle('has-selection', currentProp !== 'all');
}

function selectProp(name) {
  currentProp = name; closePropDropdown(); render();
}

// ── CITY FILTER ───────────────────────────────────────────────────────────────
function setCity(city) {
  currentCity = city;
  currentProp = 'all'; // reset prop filter when city changes
  document.querySelectorAll('.city-btn').forEach(b => b.classList.toggle('active', b.dataset.city === city));
  render();
}

// ── TAB ───────────────────────────────────────────────────────────────────────
function setTab(t, el) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); render();
}

// ── RENDER LEADS ──────────────────────────────────────────────────────────────
function renderLeads() {
  const grid = document.getElementById('leads-grid');
  let filtered = leads.filter(l => {
    if (currentProp !== 'all' && l.property !== currentProp) return false;
    if (currentCity !== 'all' && getPropCity(l.property) !== currentCity) return false;
    return true;
  });

  if (currentTab === 'active')   filtered = filtered.filter(l => !l.disabled);
  if (currentTab === 'disabled') filtered = filtered.filter(l => l.disabled);
  if (currentTab === 'due')      filtered = filtered.filter(l => { if (l.disabled) return false; const s = getFollowupStatus(l); return s.overdue || s.dueToday; });

  filtered.sort((a, b) => {
    if (a.disabled && !b.disabled) return 1; if (!a.disabled && b.disabled) return -1;
    const sa = getFollowupStatus(a), sb = getFollowupStatus(b);
    if (sa.overdue && !sb.overdue) return -1; if (!sa.overdue && sb.overdue) return 1;
    if (sa.dueToday && !sb.dueToday) return -1; if (!sa.dueToday && sb.dueToday) return 1;
    return b.score - a.score;
  });

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="icon">🌸</div><p>No leads here yet.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(l => {
    const st   = getFollowupStatus(l);
    const fi   = l.disabled ? { emoji: '💤', cls: 'dis', label: '', trackCls: 'dis' } : getFireInfo(l.score);
    const pct  = (l.score / 10) * 100;
    const city = getPropCity(l.property);
    const last = new Date(l.lastFollowup || l.created).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const icon = st.cardCls === 'overdue' ? '⚠️' : st.cardCls === 'due-today' ? '⏰' : st.cardCls === 'ok' ? '✅' : '💤';
    return `
    <div class="lead-card ${st.cardCls}" data-id="${l.id}">
      <div class="card-top">
        <div class="fire-badge">
          <div class="fire-emoji">${fi.emoji}</div>
          <div class="fire-score ${fi.cls}">${l.score}/10</div>
        </div>
        <div class="lead-main">
          <div class="lead-name">
            ${l.name}
            <span class="prop-pill">${l.property}</span>
            ${city ? `<span class="city-pill ${city}">${city}</span>` : ''}
            ${l.disabled ? `<span class="disabled-pill">disabled</span>` : ''}
          </div>
          <div class="lead-meta">
            ${l.phone ? `<span>📞 ${l.phone}</span>` : ''}
            <span>📅 ${last}</span>
            ${l.notes ? `<span>📝 ${l.notes.substring(0,36)}${l.notes.length>36?'…':''}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="heat-bar-wrap">
        <div class="heat-bar-track"><div class="heat-bar-fill ${fi.trackCls}" style="width:${pct}%"></div></div>
        <span class="heat-label ${fi.trackCls}">${fi.label}</span>
      </div>
      <div class="followup-row">
        <span class="status-chip ${st.chipCls}">${icon} ${st.label}</span>
        <div class="card-actions">
          ${!l.disabled
            ? `<button class="btn-done action-btn" data-action="done" data-id="${l.id}">✓ Done</button>`
            : `<button class="btn-reactivate action-btn" data-action="reactivate" data-id="${l.id}">↩ Reactivate</button>`}
          <button class="btn-edit action-btn" data-action="edit" data-id="${l.id}">Edit</button>
          <button class="btn-delete action-btn" data-action="options" data-id="${l.id}">• • •</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.action-btn'); if (!btn) return;
  const id = btn.dataset.id, action = btn.dataset.action;
  if (action === 'done')       markFollowup(id);
  else if (action === 'reactivate') reactivateLead(id);
  else if (action === 'edit')  editLead(id);
  else if (action === 'options') openOptionsModal(id);
});

function markFollowup(id) {
  const l = leads.find(x => x.id === id); if (!l) return;
  l.lastFollowup = Date.now(); save(); render();
  showNotify(`✅ Follow-up logged for ${l.name}. Next in ${getFollowupHours(l.score)}h.`);
  scheduleNotifications();
}

function reactivateLead(id) {
  const l = leads.find(x => x.id === id); if (!l) return;
  l.disabled = false; l.disabledReason = null; l.lowScoreSince = null; l.lastFollowup = Date.now();
  save(); render();
}

function deleteLead(id) {
  leads = leads.filter(x => x.id !== id); save(); render();
}

function movingIn(id) {
  const l = leads.find(x => x.id === id); if (!l) return;
  const prop = l.property;
  l.disabled = true; l.disabledReason = '🏠 Moved In!'; l.movedIn = true;
  leads.forEach(o => { if (o.id !== id && o.property === prop && !o.disabled) { o.disabled = true; o.disabledReason = 'Property filled'; } });
  save(); closeOptionsModal(); render();
  showNotify(`🏠 ${l.name} moved in! Other leads for ${prop} deactivated.`);
}

function openOptionsModal(id) {
  const l = leads.find(x => x.id === id); if (!l) return;
  document.getElementById('options-lead-name').textContent = l.name;
  document.getElementById('options-modal').dataset.leadId  = id;
  document.getElementById('options-modal').style.display   = 'flex';
}
function closeOptionsModal() { document.getElementById('options-modal').style.display = 'none'; }

// ── LEAD MODAL ────────────────────────────────────────────────────────────────
function editLead(id) {
  const l = leads.find(x => x.id === id); if (!l) return;
  editingId = id;
  document.getElementById('f-name').value  = l.name;
  document.getElementById('f-phone').value = l.phone || '';
  document.getElementById('f-notes').value = l.notes || '';
  document.getElementById('f-score').value = l.score;
  updateScore(l.score);
  populatePropertySelect(l.property);
  document.getElementById('modal-title').textContent = 'Edit Lead';
  document.getElementById('modal').style.display = 'flex';
}

function openModal() {
  editingId = null;
  document.getElementById('f-name').value  = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-score').value = 5;
  updateScore(5);
  populatePropertySelect();
  document.getElementById('modal-title').textContent = 'Add Lead';
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function populatePropertySelect(selected) {
  const sel = document.getElementById('f-property');
  if (!properties.length) { sel.innerHTML = `<option value="">— Add a property first —</option>`; return; }
  let html = '';
  CITIES.forEach(city => {
    const cityProps = properties.filter(p => p.city === city);
    if (!cityProps.length) return;
    html += `<optgroup label="${city}">`;
    cityProps.forEach(p => { html += `<option value="${p.name}" ${selected===p.name?'selected':''}>${p.name}</option>`; });
    html += `</optgroup>`;
  });
  sel.innerHTML = html;
}

function updateScore(v) {
  v = parseInt(v);
  const fi = getFireInfo(v);
  document.getElementById('score-big').textContent   = v;
  document.getElementById('score-label').textContent = fi.label;
  document.getElementById('big-fire').textContent    = fi.emoji;
  const colors = { hot: '#e05a20', warm: '#c4860a', cold: '#5598d0' };
  const c = colors[fi.cls] || '#9a7f70';
  document.getElementById('score-big').style.color   = c;
  document.getElementById('score-label').style.color = c;
  const pct = ((v - 1) / 9) * 100;
  document.getElementById('f-score').style.background =
    `linear-gradient(90deg, #f5b8a0 0%, #ff6b35 ${pct}%, #ecddd3 ${pct}%, #ecddd3 100%)`;
}

function saveLead() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const score    = parseInt(document.getElementById('f-score').value);
  const property = document.getElementById('f-property').value;
  if (!property) { alert('Please add a property first.'); return; }

  if (editingId) {
    const l = leads.find(x => x.id === editingId), oldScore = l.score;
    l.name = name; l.phone = document.getElementById('f-phone').value.trim();
    l.notes = document.getElementById('f-notes').value.trim();
    l.property = property; l.score = score;
    if (score > 5) l.lowScoreSince = null;
    if (score <= 5 && oldScore > 5) l.lowScoreSince = Date.now();
  } else {
    const now = Date.now();
    leads.push({ id: 'l_'+now+Math.random().toString(36).slice(2), name, phone: document.getElementById('f-phone').value.trim(), notes: document.getElementById('f-notes').value.trim(), property, score, created: now, lastFollowup: null, lowScoreSince: score <= 5 ? now : null, disabled: false });
  }
  save(); closeModal(); render(); scheduleNotifications();
}

// ── PROPERTY MANAGER ──────────────────────────────────────────────────────────
function openPropModal() {
  renderPropGroupList();
  document.getElementById('new-prop-input').value = '';
  document.getElementById('prop-modal').style.display = 'flex';
}
function closePropModal() { document.getElementById('prop-modal').style.display = 'none'; render(); }

function renderPropGroupList() {
  const el = document.getElementById('prop-city-groups');
  let html = '';
  CITIES.forEach(city => {
    const cityProps = properties.filter(p => p.city === city);
    if (!cityProps.length) return;
    html += `<div><div class="prop-city-section-label">${city}</div><div class="prop-items-row">`;
    cityProps.forEach((p, _) => {
      const idx = properties.indexOf(p);
      html += `<div class="prop-item-mgr ${city}">${p.name}<button onclick="removeProp(${idx})">×</button></div>`;
    });
    html += `</div></div>`;
  });
  el.innerHTML = html || `<p style="color:var(--text3);font-size:13px;font-weight:600;margin-top:8px;">No properties yet.</p>`;
}

function addProperty() {
  const name = document.getElementById('new-prop-input').value.trim();
  const city = document.getElementById('new-prop-city').value;
  if (!name || properties.find(p => p.name === name)) return;
  properties.push({ name, city }); save(); renderPropGroupList();
  document.getElementById('new-prop-input').value = '';
}

function removeProp(i) {
  const p = properties[i];
  if (leads.some(l => l.property === p.name) && !confirm(`Leads exist under "${p.name}". Remove anyway?`)) return;
  properties.splice(i, 1); save(); renderPropGroupList();
}

// ── NOTIFY BAR ────────────────────────────────────────────────────────────────
function showNotify(msg) {
  const bar = document.getElementById('notify-bar');
  bar.textContent = msg; bar.classList.add('show');
  setTimeout(() => bar.classList.remove('show'), 4000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
updateScore(5);
render();
initNotifications();
setInterval(() => { checkAutoDisable(); render(); }, 5 * 60 * 1000);
// Re-schedule notifications every hour in case app stays open
setInterval(scheduleNotifications, 60 * 60 * 1000);
</script></body>
</html>
