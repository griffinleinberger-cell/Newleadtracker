<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #fffcfa;
    --surface2: #fdf7f2;
    --border: #ecddd3;
    --shadow: rgba(180,140,110,0.12);
    --text: #3d2e24;
    --text2: #9a7f70;
    --text3: #c4a898;

    --peach: #f5b8a0;
    --peach-light: #fde8df;
    --peach-dark: #e8906e;
    --mint: #a8d8c8;
    --mint-light: #dff2ec;
    --lavender: #c5b8e8;
    --lavender-light: #ede8f8;
    --sky: #a8cce8;
    --sky-light: #ddeef8;
    --blush: #f0b8c8;
    --blush-light: #fce8ef;
    --butter: #f5dfa0;
    --butter-light: #fdf4db;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(245,184,160,0.2) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(197,184,232,0.2) 0%, transparent 50%),
      radial-gradient(circle at 60% 10%, rgba(168,216,200,0.15) 0%, transparent 40%);
  }

  .app { max-width: 720px; margin: 0 auto; padding: 28px 16px 60px; }

  header { text-align: center; margin-bottom: 28px; }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px var(--shadow);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--text);
    margin-bottom: 20px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 14px 12px;
    text-align: center;
    box-shadow: 0 3px 12px var(--shadow);
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card .emoji { font-size: 22px; margin-bottom: 4px; }
  .stat-card .num { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
  .stat-card .lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text2); }
  .stat-card.s-overdue { background: linear-gradient(135deg, #fff0ec, #ffe8e0); border-color: #f5c4b4; }
  .stat-card.s-overdue .num { color: #e05a35; }
  .stat-card.s-today { background: linear-gradient(135deg, #fffaec, #fff3d0); border-color: #f5dfa0; }
  .stat-card.s-today .num { color: #c4860a; }
  .stat-card.s-active { background: linear-gradient(135deg, #f0faf6, #dff2ec); border-color: #a8d8c8; }
  .stat-card.s-active .num { color: #2a8a6a; }

  .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .prop-filter { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }

  .prop-tag {
    padding: 7px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--text2);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    box-shadow: 0 2px 6px var(--shadow);
  }
  .prop-tag.active { background: var(--peach); border-color: var(--peach-dark); color: #6b2a0a; }
  .prop-tag:not(.active):hover { background: var(--peach-light); border-color: var(--peach); }

  .btn-add {
    padding: 9px 18px;
    background: linear-gradient(135deg, var(--peach), var(--peach-dark));
    color: white;
    border: none;
    border-radius: 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(232,144,110,0.4);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(232,144,110,0.5); }

  .btn-secondary {
    padding: 9px 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    color: var(--text2);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    box-shadow: 0 2px 6px var(--shadow);
  }
  .btn-secondary:hover { border-color: var(--peach); color: var(--peach-dark); }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 5px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .tab {
    flex: 1;
    padding: 8px 10px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.2s;
    text-align: center;
  }
  .tab.active { background: var(--lavender); color: #3a2570; }
  .tab:not(.active):hover { background: var(--lavender-light); }

  .notify-bar {
    background: var(--mint-light);
    border: 1.5px solid var(--mint);
    border-radius: 14px;
    padding: 10px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    font-weight: 600;
    color: #1a6a50;
    display: none;
  }
  .notify-bar.show { display: block; }

  .leads-grid { display: flex; flex-direction: column; gap: 12px; }

  .lead-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 16px 18px;
    box-shadow: 0 4px 16px var(--shadow);
    transition: all 0.25s;
    animation: slideIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .lead-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    border-radius: 20px 0 0 20px;
  }
  .lead-card.overdue::before { background: linear-gradient(180deg, #ff6b35, #ff9a7a); }
  .lead-card.due-today::before { background: linear-gradient(180deg, #f5a623, #f5d060); }
  .lead-card.ok::before { background: linear-gradient(180deg, #a8d8c8, #74c4aa); }
  .lead-card.disabled::before { background: var(--border); }
  .lead-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--shadow); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }

  .fire-badge { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 52px; }
  .fire-emoji { font-size: 28px; line-height: 1; margin-bottom: 2px; }
  .fire-score { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; line-height: 1; }
  .fire-score.hot { color: #e05a20; }
  .fire-score.warm { color: #c4860a; }
  .fire-score.cold { color: #5598d0; }
  .fire-score.dis { color: var(--text3); }

  .lead-main { flex: 1; min-width: 0; }
  .lead-name { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 5px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .prop-pill { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; background: var(--lavender-light); color: #5a3a9a; border: 1px solid var(--lavender); }
  .disabled-pill { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; background: #f0ebe6; color: var(--text3); border: 1px solid var(--border); }
  .lead-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--text2); font-weight: 600; }

  .heat-bar-wrap { margin: 10px 0 8px; display: flex; align-items: center; gap: 10px; }
  .heat-bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .heat-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }
  .heat-bar-fill.hot { background: linear-gradient(90deg, #f5b8a0, #ff6b35); }
  .heat-bar-fill.warm { background: linear-gradient(90deg, #f5dfa0, #f5a623); }
  .heat-bar-fill.cold { background: linear-gradient(90deg, #a8cce8, #74b9ff); }
  .heat-bar-fill.dis { background: var(--border); }
  .heat-label { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; min-width: 34px; }
  .heat-label.hot { color: #e05a20; }
  .heat-label.warm { color: #c4860a; }
  .heat-label.cold { color: #5598d0; }
  .heat-label.dis { color: var(--text3); }

  .followup-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .status-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; }
  .chip-overdue { background: #ffe8e0; color: #c03a18; border: 1px solid #f5c4b4; }
  .chip-today { background: #fff3d0; color: #a06800; border: 1px solid #f5dfa0; }
  .chip-ok { background: var(--mint-light); color: #1a6a50; border: 1px solid var(--mint); }
  .chip-disabled { background: #f0ebe6; color: var(--text3); border: 1px solid var(--border); }

  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn-done { padding: 7px 14px; background: linear-gradient(135deg, var(--mint-light), var(--mint)); border: 1.5px solid var(--mint); border-radius: 12px; color: #1a5a44; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
  .btn-done:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(168,216,200,0.5); }
  .btn-edit { padding: 7px 14px; background: var(--lavender-light); border: 1.5px solid var(--lavender); border-radius: 12px; color: #3a2570; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
  .btn-edit:hover { background: var(--lavender); }
  .btn-reactivate { padding: 7px 14px; background: var(--butter-light); border: 1.5px solid var(--butter); border-radius: 12px; color: #7a5a0a; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
  .btn-movingin {
    width: 100%;
    padding: 14px 20px;
    background: linear-gradient(135deg, var(--mint-light), var(--mint));
    border: 1.5px solid var(--mint);
    border-radius: 14px;
    color: #1a5a44;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .btn-movingin:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(168,216,200,0.5); }

  .btn-removelead {
    width: 100%;
    padding: 14px 20px;
    background: #fff0ec;
    border: 1.5px solid #f5c4b4;
    border-radius: 14px;
    color: #c03a18;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .btn-removelead:hover { background: #ffe0d6; }

  .btn-delete { padding: 7px 14px; background: #f5f0eb; border: 1.5px solid var(--border); border-radius: 12px; color: var(--text2); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
  .btn-delete:hover { background: var(--peach-light); border-color: var(--peach); color: var(--peach-dark); }

  .empty { text-align: center; padding: 50px 20px; color: var(--text2); background: var(--surface); border-radius: 20px; border: 1.5px dashed var(--border); }
  .empty .icon { font-size: 40px; margin-bottom: 10px; }
  .empty p { font-size: 14px; font-weight: 600; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(61,46,36,0.35); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal { background: var(--surface); border: 1.5px solid var(--border); border-radius: 24px; padding: 28px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(180,140,110,0.25); animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .modal h2 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 20px; color: var(--text); }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text2); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--peach); box-shadow: 0 0 0 3px var(--peach-light); }
  .form-group select option { background: var(--surface); }

  .fire-slider-wrap { background: var(--bg); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; }
  .fire-display { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
  .fire-display .big-fire { font-size: 38px; transition: all 0.2s; }
  .fire-display .score-info { text-align: left; }
  .fire-display .score-big { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 700; line-height: 1; transition: color 0.2s; }
  .fire-display .score-label { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s; }

  input[type=range].fire-range { width: 100%; -webkit-appearance: none; height: 6px; border-radius: 3px; outline: none; border: none; padding: 0; cursor: pointer; margin-bottom: 6px; }
  input[type=range].fire-range::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: white; border: 3px solid var(--peach-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.15); cursor: pointer; transition: transform 0.15s; }
  input[type=range].fire-range::-webkit-slider-thumb:active { transform: scale(1.2); }

  .fire-ticks { display: flex; justify-content: space-between; padding: 0 4px; }
  .fire-ticks span { font-size: 10px; color: var(--text3); font-weight: 700; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .btn-modal-cancel { padding: 10px 20px; background: transparent; border: 1.5px solid var(--border); border-radius: 12px; color: var(--text2); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-modal-cancel:hover { border-color: var(--text2); }
  .btn-modal-save { padding: 10px 24px; background: linear-gradient(135deg, var(--peach), var(--peach-dark)); border: none; border-radius: 12px; color: white; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 14px rgba(232,144,110,0.4); transition: all 0.2s; }
  .btn-modal-save:hover { transform: translateY(-1px); }

  .prop-input-row { display: flex; gap: 8px; }
  .prop-input-row input { flex: 1; }
  .btn-add-prop { padding: 10px 16px; background: var(--peach-light); border: 1.5px solid var(--peach); border-radius: 12px; color: var(--peach-dark); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .btn-add-prop:hover { background: var(--peach); color: white; }

  .prop-list-mgr { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .prop-item-mgr { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--lavender-light); border: 1.5px solid var(--lavender); border-radius: 12px; font-size: 12px; font-weight: 700; color: #3a2570; }
  .prop-item-mgr button { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; font-weight: 700; transition: color 0.15s; }
  .prop-item-mgr button:hover { color: #c03a18; }

  @media (max-width: 560px) {
    .stats-row { gap: 8px; }
    .stat-card { padding: 10px 8px; }
    .stat-card .num { font-size: 22px; }
    .form-row { grid-template-columns: 1fr; }
    header h1 { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-badge">🏠 Property Management</div>
    <h1>Lead Tracker</h1>
  </header>

  <div class="stats-row">
    <div class="stat-card s-overdue">
      <div class="emoji">🔥</div>
      <div class="num" id="stat-overdue">0</div>
      <div class="lbl">Overdue</div>
    </div>
    <div class="stat-card s-today">
      <div class="emoji">⏰</div>
      <div class="num" id="stat-today">0</div>
      <div class="lbl">Due Today</div>
    </div>
    <div class="stat-card s-active">
      <div class="emoji">✨</div>
      <div class="num" id="stat-active">0</div>
      <div class="lbl">Active</div>
    </div>
  </div>

  <div id="notify-bar" class="notify-bar"></div>

  <div class="controls">
    <div class="prop-filter" id="prop-filter"></div>
    <button class="btn-add" onclick="openModal()">＋ Add Lead</button>
    <button class="btn-secondary" onclick="openPropModal()">🏠 Properties</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('active',this)">Active</button>
    <button class="tab" onclick="setTab('due',this)">Due Today</button>
    <button class="tab" onclick="setTab('disabled',this)">Disabled</button>
    <button class="tab" onclick="setTab('all',this)">All</button>
  </div>

  <div class="leads-grid" id="leads-grid"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div id="modal" class="modal-overlay" style="display:none" onclick="closeIfOverlay(event)">
  <div class="modal">
    <h2 id="modal-title">Add Lead</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Full Name</label>
        <input id="f-name" type="text" placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input id="f-phone" type="tel" placeholder="(843) 555-0100">
      </div>
    </div>
    <div class="form-group">
      <label>Property</label>
      <select id="f-property"></select>
    </div>
    <div class="form-group">
      <label>Heat Score</label>
      <div class="fire-slider-wrap">
        <div class="fire-display">
          <span class="big-fire" id="big-fire">🔥</span>
          <div class="score-info">
            <div class="score-big" id="score-big">5</div>
            <div class="score-label" id="score-label">Warm</div>
          </div>
        </div>
        <input type="range" class="fire-range" id="f-score" min="1" max="10" value="5" oninput="updateScore(this.value)">
        <div class="fire-ticks">
          <span>1🧊</span><span>2</span><span>3</span><span>4</span><span>5</span>
          <span>6</span><span>7</span><span>8</span><span>9</span><span>10🔥</span>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" rows="2" placeholder="Quick notes..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-modal-save" onclick="saveLead()">Save Lead</button>
    </div>
  </div>
</div>

<!-- OPTIONS MODAL -->
<div id="options-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeOptionsModal()">
  <div class="modal" style="max-width:360px;text-align:center;">
    <div style="font-size:32px;margin-bottom:8px;">👤</div>
    <h2 id="options-lead-name" style="margin-bottom:6px;font-size:20px;"></h2>
    <p style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:24px;">What would you like to do?</p>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn-movingin" onclick="movingIn(document.getElementById('options-modal').dataset.leadId)">
        🏠 Moving In!
        <span style="display:block;font-size:11px;font-weight:600;opacity:0.8;margin-top:2px;">Marks as moved in & deactivates other leads for this property</span>
      </button>
      <button class="btn-removelead" onclick="deleteLead(document.getElementById('options-modal').dataset.leadId);closeOptionsModal()">
        🗑️ Remove Lead
        <span style="display:block;font-size:11px;font-weight:600;opacity:0.8;margin-top:2px;">Permanently deletes this lead</span>
      </button>
      <button class="btn-modal-cancel" style="margin-top:4px;" onclick="closeOptionsModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- PROPERTY MANAGER MODAL -->
<div id="prop-modal" class="modal-overlay" style="display:none" onclick="closePropIfOverlay(event)">
  <div class="modal">
    <h2>🏠 Properties</h2>
    <div class="form-group">
      <label>Add Property</label>
      <div class="prop-input-row">
        <input id="new-prop-input" type="text" placeholder="e.g. 321 Fairington Dr">
        <button class="btn-add-prop" onclick="addProperty()">Add</button>
      </div>
    </div>
    <div class="prop-list-mgr" id="prop-list-mgr"></div>
    <div class="modal-actions">
      <button class="btn-modal-save" onclick="closePropModal()">Done</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'pm_leads_v3';
const PROPS_KEY   = 'pm_props_v3';

let leads = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let properties = JSON.parse(localStorage.getItem(PROPS_KEY) || '["Sumter Home","321 Fairington Dr"]');
let editingId = null, currentTab = 'active', currentProp = 'all';

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
  localStorage.setItem(PROPS_KEY, JSON.stringify(properties));
}

function getFollowupHours(score) { return score >= 6 ? 24 : 48; }

function getFireInfo(score) {
  if (score >= 8) return { emoji: '🔥', cls: 'hot', label: 'Hot!', trackCls: 'hot' };
  if (score >= 6) return { emoji: '🌶️', cls: 'hot', label: 'Warm', trackCls: 'warm' };
  if (score >= 4) return { emoji: '🌤️', cls: 'warm', label: 'Cool', trackCls: 'warm' };
  return { emoji: '🧊', cls: 'cold', label: 'Cold', trackCls: 'cold' };
}

function getFollowupStatus(lead) {
  if (lead.disabled) return { label: lead.disabledReason || 'Disabled', chipCls: 'chip-disabled', cardCls: 'disabled', overdue: false, dueToday: false };
  const now = Date.now(), last = lead.lastFollowup || lead.created;
  const due = last + getFollowupHours(lead.score) * 3600000;
  const diff = due - now, diffH = diff / 3600000;
  if (diff < 0) return { label: `${Math.abs(Math.round(diffH))}h overdue`, chipCls: 'chip-overdue', cardCls: 'overdue', overdue: true, dueToday: false };
  if (diffH <= 6) return { label: `Due in ${Math.round(diffH)}h`, chipCls: 'chip-today', cardCls: 'due-today', overdue: false, dueToday: true };
  const days = Math.floor(diffH / 24), hrs = Math.round(diffH % 24);
  return { label: days > 0 ? `In ${days}d ${hrs}h` : `In ${Math.round(diffH)}h`, chipCls: 'chip-ok', cardCls: 'ok', overdue: false, dueToday: false };
}

function checkAutoDisable() {
  const now = Date.now(); let changed = false;
  leads.forEach(l => {
    if (l.disabled || l.score > 5) return;
    if (now - (l.lowScoreSince || l.created) > 7 * 24 * 3600000) {
      l.disabled = true; l.disabledReason = 'Score ≤5 for 7 days'; changed = true;
    }
  });
  if (changed) { save(); showNotify('⚠️ One or more leads auto-disabled after 7 days below score 5.'); }
}

function render() {
  checkAutoDisable(); updateStats(); updatePropertyFilter(); renderLeads();
}

function updateStats() {
  let overdue = 0, today = 0, active = 0;
  leads.forEach(l => {
    if (l.disabled) return; active++;
    const s = getFollowupStatus(l);
    if (s.overdue) overdue++; if (s.dueToday) today++;
  });
  document.getElementById('stat-overdue').textContent = overdue;
  document.getElementById('stat-today').textContent = today;
  document.getElementById('stat-active').textContent = active;
}

function updatePropertyFilter() {
  const el = document.getElementById('prop-filter');
  el.innerHTML = `<button class="prop-tag ${currentProp==='all'?'active':''}" onclick="setProp('all')">All</button>`;
  properties.forEach(p => {
    const safe = p.replace(/'/g,"\\'");
    el.innerHTML += `<button class="prop-tag ${currentProp===p?'active':''}" onclick="setProp('${safe}')">${p}</button>`;
  });
}

function setProp(p) { currentProp = p; render(); }
function setTab(t, el) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); render();
}

function renderLeads() {
  const grid = document.getElementById('leads-grid');
  let filtered = leads.filter(l => currentProp === 'all' || l.property === currentProp);
  if (currentTab === 'active')   filtered = filtered.filter(l => !l.disabled);
  if (currentTab === 'disabled') filtered = filtered.filter(l => l.disabled);
  if (currentTab === 'due')      filtered = filtered.filter(l => { if (l.disabled) return false; const s = getFollowupStatus(l); return s.overdue || s.dueToday; });

  filtered.sort((a, b) => {
    if (a.disabled && !b.disabled) return 1; if (!a.disabled && b.disabled) return -1;
    const sa = getFollowupStatus(a), sb = getFollowupStatus(b);
    if (sa.overdue && !sb.overdue) return -1; if (!sa.overdue && sb.overdue) return 1;
    if (sa.dueToday && !sb.dueToday) return -1; if (!sa.dueToday && sb.dueToday) return 1;
    return b.score - a.score;
  });

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="icon">🌸</div><p>No leads here yet.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(l => {
    const st = getFollowupStatus(l);
    const fi = l.disabled ? { emoji: '💤', cls: 'dis', label: '', trackCls: 'dis' } : getFireInfo(l.score);
    const pct = (l.score / 10) * 100;
    const lastDate = new Date(l.lastFollowup || l.created).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const statusIcon = st.cardCls === 'overdue' ? '⚠️' : st.cardCls === 'due-today' ? '⏰' : st.cardCls === 'ok' ? '✅' : '💤';
    return `
    <div class="lead-card ${st.cardCls}" data-id="${l.id}">
      <div class="card-top">
        <div class="fire-badge">
          <div class="fire-emoji">${fi.emoji}</div>
          <div class="fire-score ${fi.cls}">${l.score}/10</div>
        </div>
        <div class="lead-main">
          <div class="lead-name">
            ${l.name}
            <span class="prop-pill">${l.property}</span>
            ${l.disabled ? `<span class="disabled-pill">disabled</span>` : ''}
          </div>
          <div class="lead-meta">
            ${l.phone ? `<span>📞 ${l.phone}</span>` : ''}
            <span>📅 Last: ${lastDate}</span>
            ${l.notes ? `<span>📝 ${l.notes.substring(0,38)}${l.notes.length>38?'…':''}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="heat-bar-wrap">
        <div class="heat-bar-track">
          <div class="heat-bar-fill ${fi.trackCls}" style="width:${pct}%"></div>
        </div>
        <span class="heat-label ${fi.trackCls}">${fi.label}</span>
      </div>
      <div class="followup-row">
        <span class="status-chip ${st.chipCls}">${statusIcon} ${st.label}</span>
        <div class="card-actions">
          ${!l.disabled
            ? `<button class="btn-done action-btn" data-action="done" data-id="${l.id}">✓ Done</button>`
            : `<button class="btn-reactivate action-btn" data-action="reactivate" data-id="${l.id}">↩ Reactivate</button>`}
          <button class="btn-edit action-btn" data-action="edit" data-id="${l.id}">Edit</button>
          <button class="btn-delete action-btn" data-action="options" data-id="${l.id}">• • •</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function markFollowup(id) {
  const l = leads.find(x => x.id === id); if (!l) return;
  l.lastFollowup = Date.now(); save(); render();
  showNotify(`✅ Follow-up logged for ${l.name}. Next in ${getFollowupHours(l.score)}h.`);
}

function reactivateLead(id) {
  const l = leads.find(x => x.id === id); if (!l) return;
  l.disabled = false; l.disabledReason = null; l.lowScoreSince = null; l.lastFollowup = Date.now();
  save(); render();
}

function deleteLead(id) {
  leads = leads.filter(x => x.id !== id); save(); render();
}

function movingIn(id) {
  const l = leads.find(x => x.id === id); if (!l) return;
  const prop = l.property;
  // Mark the moving-in lead as converted
  l.disabled = true;
  l.disabledReason = '🏠 Moved In!';
  l.movedIn = true;
  // Disable all OTHER active leads under the same property
  leads.forEach(other => {
    if (other.id !== id && other.property === prop && !other.disabled) {
      other.disabled = true;
      other.disabledReason = 'Property filled';
    }
  });
  save(); closeOptionsModal(); render();
  showNotify(`🏠 ${l.name} moved in! Other leads for ${prop} have been deactivated.`);
}

function openOptionsModal(id) {
  const l = leads.find(x => x.id === id); if (!l) return;
  document.getElementById('options-lead-name').textContent = l.name;
  document.getElementById('options-modal').style.display = 'flex';
  document.getElementById('options-modal').dataset.leadId = id;
}

function closeOptionsModal() { document.getElementById('options-modal').style.display = 'none'; }

// Event delegation for all card buttons
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.action-btn');
  if (!btn) return;
  const id = btn.dataset.id;
  const action = btn.dataset.action;
  if (action === 'done') markFollowup(id);
  else if (action === 'reactivate') reactivateLead(id);
  else if (action === 'edit') editLead(id);
  else if (action === 'options') openOptionsModal(id);
});

function editLead(id) {
  const l = leads.find(x => x.id === id); if (!l) return;
  editingId = id;
  document.getElementById('f-name').value = l.name;
  document.getElementById('f-phone').value = l.phone || '';
  document.getElementById('f-notes').value = l.notes || '';
  document.getElementById('f-score').value = l.score;
  updateScore(l.score); populatePropertySelect(l.property);
  document.getElementById('modal-title').textContent = 'Edit Lead';
  document.getElementById('modal').style.display = 'flex';
}

function openModal() {
  editingId = null;
  document.getElementById('f-name').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-score').value = 5;
  updateScore(5); populatePropertySelect();
  document.getElementById('modal-title').textContent = 'Add Lead';
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
function closeIfOverlay(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function populatePropertySelect(selected) {
  const sel = document.getElementById('f-property');
  sel.innerHTML = properties.length
    ? properties.map(p => `<option value="${p}" ${selected===p?'selected':''}>${p}</option>`).join('')
    : `<option value="">— Add a property first —</option>`;
}

function updateScore(v) {
  v = parseInt(v);
  const fi = getFireInfo(v);
  document.getElementById('score-big').textContent = v;
  document.getElementById('score-label').textContent = fi.label;
  document.getElementById('big-fire').textContent = fi.emoji;
  const colors = { hot: '#e05a20', warm: '#c4860a', cold: '#5598d0' };
  const c = colors[fi.cls] || '#9a7f70';
  document.getElementById('score-big').style.color = c;
  document.getElementById('score-label').style.color = c;
  const pct = ((v - 1) / 9) * 100;
  document.getElementById('f-score').style.background =
    `linear-gradient(90deg, #f5b8a0 0%, #ff6b35 ${pct}%, #ecddd3 ${pct}%, #ecddd3 100%)`;
}

function saveLead() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const score = parseInt(document.getElementById('f-score').value);
  const property = document.getElementById('f-property').value;
  if (!property) { alert('Please add a property first.'); return; }

  if (editingId) {
    const l = leads.find(x => x.id === editingId);
    const oldScore = l.score;
    l.name = name; l.phone = document.getElementById('f-phone').value.trim();
    l.notes = document.getElementById('f-notes').value.trim();
    l.property = property; l.score = score;
    if (score > 5) l.lowScoreSince = null;
    if (score <= 5 && oldScore > 5) l.lowScoreSince = Date.now();
  } else {
    const now = Date.now();
    leads.push({
      id: 'l_' + now + Math.random().toString(36).slice(2),
      name, phone: document.getElementById('f-phone').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
      property, score, created: now, lastFollowup: null,
      lowScoreSince: score <= 5 ? now : null, disabled: false
    });
  }
  save(); closeModal(); render();
}

function openPropModal() {
  renderPropList();
  document.getElementById('new-prop-input').value = '';
  document.getElementById('prop-modal').style.display = 'flex';
}
function closePropModal() { document.getElementById('prop-modal').style.display = 'none'; render(); }
function closePropIfOverlay(e) { if (e.target === document.getElementById('prop-modal')) closePropModal(); }

function renderPropList() {
  document.getElementById('prop-list-mgr').innerHTML = properties.map((p, i) =>
    `<div class="prop-item-mgr">${p}<button onclick="removeProp(${i})">×</button></div>`
  ).join('');
}

function addProperty() {
  const v = document.getElementById('new-prop-input').value.trim();
  if (!v || properties.includes(v)) return;
  properties.push(v); save(); renderPropList();
  document.getElementById('new-prop-input').value = '';
}

function removeProp(i) {
  const p = properties[i];
  if (leads.some(l => l.property === p) && !confirm(`Leads exist under "${p}". Remove anyway?`)) return;
  properties.splice(i, 1); save(); renderPropList();
}

function showNotify(msg) {
  const bar = document.getElementById('notify-bar');
  bar.textContent = msg; bar.classList.add('show');
  setTimeout(() => bar.classList.remove('show'), 4000);
}

updateScore(5);
render();
setInterval(() => { checkAutoDisable(); render(); }, 5 * 60 * 1000);
</script>
</body>
</html>
